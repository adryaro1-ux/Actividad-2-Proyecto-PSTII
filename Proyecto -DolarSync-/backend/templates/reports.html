<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DolarSync - Gestión de Reportes</title>
    <link rel="icon" href="/logo" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
    :root {
        --primary: #0070d1;
        --primary-soft: #e0f2fe;
        --primary-dark: #004c99;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --bg-body: #f8fafc;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --white: #ffffff;
        --shadow-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: radial-gradient(circle at top right, #eff6ff, #f8fafc);
        margin: 0; 
        padding-top: 100px; 
        color: var(--text-main);
        min-height: 100vh;
    }

    /* --- NAVBAR --- */
    .header {
        width: 100%; padding: 0 5%; height: 80px;
        background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
        display: flex; justify-content: space-between; align-items: center;
        position: fixed; top: 0; z-index: 1000; box-sizing: border-box;
        border-bottom: 1px solid rgba(226, 232, 240, 0.8);
    }
    .logo-container { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 12px; color: var(--primary-dark); }
    .logo-icon { width: 42px; height: 42px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 16px rgba(0,112,209,0.2); }
    
    .user-profile-section { display: flex; align-items: center; gap: 12px; }
    .user-info-pill { display: flex; align-items: center; gap: 10px; background: white; padding: 6px 16px; border-radius: 14px; border: 1px solid #f1f5f9; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    .badge-rol { font-size: 0.65rem; font-weight: 800; background: #fef3c7; color: #92400e; padding: 3px 10px; border-radius: 8px; text-transform: uppercase; }
    
    .nav-btn { background: white; border: 1px solid #e2e8f0; color: var(--text-muted); width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: 0.3s; text-decoration: none; }
    .nav-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }

    /* --- CONTENEDOR PRINCIPAL --- */
    .container { max-width: 1300px; margin: auto; padding: 20px; animation: fadeIn 0.8s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .card { 
        background: var(--white); 
        padding: 35px; 
        border-radius: 24px; 
        box-shadow: var(--shadow-premium); 
        margin-bottom: 30px; 
        border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .section-title { font-size: 1.4rem; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 15px; margin: 0; }
    .section-title i { color: var(--primary); }

    .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding-left: 5px; }
    
    input, textarea { padding: 14px 18px; border: 2px solid #f1f5f9; border-radius: 16px; font-family: inherit; font-size: 1rem; transition: 0.3s; background: #f8fafc; }
    input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 5px rgba(0,112,209,0.08); }

    .search-wrapper { position: relative; margin-bottom: 30px; }
    .search-input { width: 100%; padding: 20px 20px 20px 60px; border-radius: 20px; border: 2px solid #f1f5f9; background: white; font-size: 1.1rem; box-shadow: var(--shadow-premium); box-sizing: border-box; transition: 0.3s; }
    .search-wrapper i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; color: var(--primary); }

    /* --- TABLA --- */
    .table-card { overflow-x: auto; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 10px; min-width: 1000px; }
    th { padding: 15px 20px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; text-align: left; }
    
    tr.report-row td { padding: 20px; background: white; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
    tr.report-row td:first-child { border-left: 1px solid #f1f5f9; border-radius: 16px 0 0 16px; }
    tr.report-row td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 16px 16px 0; }
    tr.report-row:hover td { background: #fcfdfe; border-color: var(--primary-soft); }

    .btn { padding: 15px 30px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; display: inline-flex; align-items: center; gap: 10px; }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(0,112,209,0.2); }
    .btn-action { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s; border: 1px solid #f1f5f9; background: #fff; text-decoration: none; color: inherit; }
    .btn-edit:hover { background: var(--warning); color: white; border-color: var(--warning); }
    .btn-pdf:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .pill { padding: 6px 14px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: #f1f5f9; color: var(--text-muted); }
    #tasaPill { background: #ecfdf5; color: #065f46; border: 1px solid #d1fae5; padding: 10px 20px; border-radius: 12px; font-weight: 700; display: flex; align-items: center; gap: 10px; }

    /* --- MODAL --- */
    .modal-overlay {
        display: none; 
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.75); 
        backdrop-filter: blur(8px);
        z-index: 2000;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .modal-content {
        background: var(--white);
        width: 100%;
        max-width: 950px;
        max-height: 90vh;
        border-radius: 30px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow-y: auto;
        position: relative;
        animation: modalSlideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    @keyframes modalSlideUp {
        from { transform: translateY(50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .close-modal {
        position: absolute;
        top: 25px; right: 30px;
        font-size: 2rem;
        color: var(--text-muted);
        cursor: pointer;
        z-index: 2100;
        transition: 0.2s;
    }
    .close-modal:hover { color: var(--danger); transform: scale(1.1); }

    @media (max-width: 768px) { .user-text { display: none; } .grid-form { grid-template-columns: 1fr; } }
</style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <div class="logo-icon"><i class="fas fa-sync-alt"></i></div>
            <span>DolarSync</span>
        </div>
        <div class="user-profile-section">
            <div class="user-info-pill">
                <i class="fas fa-user-circle" style="color: var(--primary); font-size: 1.3rem;"></i>
                <div class="user-text" style="display: flex; flex-direction: column;">
                    <span style="font-size: 0.85rem; font-weight: 800; line-height: 1;">{{ current_user.username }}</span>
                    <span class="badge-rol" style="margin-top: 3px; width: fit-content;">{{ current_user.rol }}</span>
                </div>
            </div>
            <a href="{{ url_for('index') }}" class="nav-btn" title="Inicio"><i class="fas fa-home"></i></a>
            <a href="{{ url_for('logout') }}" class="nav-btn" style="color: var(--danger);"><i class="fas fa-power-off"></i></a>
        </div>
    </header>

    <div class="container">
        
        <div style="margin-bottom: 30px; display: {{ 'block' if current_user.rol == 'Operador' else 'none' }};">
            <button onclick="openModal()" class="btn btn-primary" style="padding: 18px 35px; border-radius: 22px; font-size: 1rem;">
                <i class="fas fa-plus-circle"></i> Nueva Operación
            </button>
        </div>

        <div id="modalOverlay" class="modal-overlay">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal()">&times;</span>
                
                <div id="formContainer" class="card" style="margin-bottom: 0; border: none; box-shadow: none; padding: 40px;">
                    <div class="section-header">
                        <h3 class="section-title"><i class="fas fa-file-signature"></i> <span id="formTitle">Nueva Operación</span></h3>
                        <div id="tasaPill"><i class="fas fa-chart-line"></i> <span id="tasaVal">Sincronizando...</span></div>
                    </div>

                    <form id="reportForm">
                        <div class="grid-form">
                            <div class="form-group"><label>Paciente</label><input type="text" id="nombre_apellido" required></div>
                            <div class="form-group"><label>Cédula</label><input type="text" id="cedula" placeholder="V-00.000.000" required></div>
                            <div class="form-group"><label>Contratante</label><input type="text" id="contratante" required></div>
                            <div class="form-group"><label>Nro. Control</label><input type="text" id="num_control" required></div>
                            <div class="form-group"><label>Nro. Póliza</label><input type="text" id="numero_poliza" placeholder="0000" required></div>
                            <div class="form-group"><label>Monto ($)</label><input type="number" step="0.01" id="monto_dolar" oninput="calcularBolivares()" required></div>
                            <div class="form-group"><label>Total Bs.</label><input type="number" step="0.01" id="monto_bs" style="background:#f0f9ff; border: 2px dashed #bae6fd; font-weight: 800; color:var(--primary);" readonly></div>
                            <div class="form-group"><label>Tratamiento</label><input type="text" id="tratamiento" required></div>
                            <div class="form-group"><label>Proveedor</label><input type="text" id="proveedor" required></div>
                            <div class="form-group"><label>Estado</label><input type="text" id="estado_paciente" required></div>
                            <div class="form-group"><label>Patología</label><input type="text" id="patologia" required></div>
                        </div>
                        <div class="form-group" style="margin-top:20px;">
                            <label>Observaciones</label>
                            <textarea id="observaciones" rows="2"></textarea>
                        </div>
                        <div style="margin-top: 30px; display: flex; gap: 15px;">
                            <button type="submit" class="btn btn-primary" id="btnSubmit" style="flex: 2;"><i class="fas fa-cloud-upload-alt"></i> Registrar Reporte</button>
                            <button type="button" class="btn" id="btnCancel" style="background: #f1f5f9; color: var(--text-muted); flex: 1;" onclick="closeModal()">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        {% if current_user.rol == 'Gerente' %}
        <div class="card" style="padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--success);">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="width: 40px; height: 40px; background: #dcfce7; color: #166534; border-radius: 10px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-file-excel"></i></div>
                    <div><h4 style="margin: 0;">Reporte Consolidado</h4><p style="margin: 0; font-size: 0.75rem; color: var(--text-muted);">Descarga casos por fecha específica</p></div>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="date" id="fechaExcel" style="padding: 8px 12px; border-radius: 10px; border: 1px solid #e2e8f0;">
                    <button onclick="descargarExcelPorFecha()" class="btn" style="background: var(--success); color: white; padding: 10px 20px; font-size: 0.85rem;"><i class="fas fa-download"></i> Exportar</button>
                </div>
            </div>
        </div>
        {% endif %}

        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="inputBusqueda" class="search-input" onkeyup="filtrarTabla()" placeholder="Buscar por cédula o nombre...">
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Paciente</th>
                        <th>Patología</th>
                        <th>Nro. Póliza</th>
                        <th>Monto ($)</th>
                        <th>Monto (Bs)</th>
                        <th style="text-align:center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="reportsTable"></tbody>
            </table>
        </div>
    </div>

   <script>
    const USER_ROL = "{{ current_user.rol }}";
    let editMode = false;
    let editId = null;
    let tasaBCVVal = 0;

    window.onload = function() { 
        cargarReportes(); 
        obtenerTasaBCV(); 
    };

    function openModal() {
        document.getElementById('modalOverlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.body.style.overflow = 'auto';
        resetForm();
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('modalOverlay')) closeModal();
    }

    async function obtenerTasaBCV() {
        try {
            const res = await fetch('/api/dolar');
            const data = await res.json();
            tasaBCVVal = parseFloat(data.price);
            document.getElementById('tasaVal').innerText = `BCV: Bs. ${data.price}`;
        } catch (e) { document.getElementById('tasaVal').innerText = "Error Tasa"; }
    }

    function calcularBolivares() {
        const valDolar = document.getElementById('monto_dolar').value;
        const campoBs = document.getElementById('monto_bs');
        if (valDolar && tasaBCVVal > 0) {
            campoBs.value = (parseFloat(valDolar) * tasaBCVVal).toFixed(2);
        }
    }

    async function cargarReportes() {
        try {
            const res = await fetch('/api/reportes_usuario'); 
            const data = await res.json();
            const tbody = document.getElementById('reportsTable');
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:50px;">No hay registros disponibles.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(r => `
                <tr class="report-row">
                    <td style="font-size: 0.85rem; color: var(--text-muted)">${r.fecha_creado}</td>
                    <td>
                        <div style="font-weight: 800;">${r.nombre_apellido}</div>
                        <div style="font-size: 0.75rem; color: var(--primary); font-weight: 600">${r.cedula}</div>
                    </td>
                    <td><span class="pill">${r.patologia}</span></td>
                    <td style="font-weight: 600; color: var(--text-muted)">${r.numero_poliza || 'N/A'}</td>
                    <td style="font-weight: 700;">$ ${parseFloat(r.monto_dolar || 0).toLocaleString('es-VE', {minimumFractionDigits: 2})}</td>
                    <td style="font-weight: 800; color: var(--primary-dark)">Bs. ${parseFloat(r.monto_bs || 0).toLocaleString('es-VE', {minimumFractionDigits: 2})}</td>
                    <td>
                        <div style="display:flex; gap:10px; justify-content:center">
                            ${(USER_ROL === 'Gerente') ? `
                                <a href="/api/descargar_registro/${r.id}" class="btn-action btn-pdf" title="PDF"><i class="fas fa-file-pdf"></i></a>
                            ` : ''}
                            ${(USER_ROL === 'Gerente' || USER_ROL === 'Coordinador') ? `
                                <button class="btn-action btn-edit" onclick="editar(${r.id})" title="Editar"><i class="fas fa-edit"></i></button>
                            ` : `<span class="pill" style="background:#dcfce7; color:#15803d">Guardado</span>`}
                        </div>
                    </td>
                </tr>`).join('');
        } catch (e) { console.error(e); }
    }

    document.getElementById('reportForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            nombre_apellido: document.getElementById('nombre_apellido').value,
            cedula: document.getElementById('cedula').value,
            contratante: document.getElementById('contratante').value,
            num_control: document.getElementById('num_control').value,
            numero_poliza: document.getElementById('numero_poliza').value,
            proveedor: document.getElementById('proveedor').value,
            estado: document.getElementById('estado_paciente').value,
            patologia: document.getElementById('patologia').value,
            monto_dolar: document.getElementById('monto_dolar').value,
            monto_bs: document.getElementById('monto_bs').value,
            observaciones: document.getElementById('observaciones').value,
            tratamiento: document.getElementById('tratamiento').value
        };
        try {
            const res = await fetch(editMode ? `/api/reporte/${editId}` : '/api/reports', {
                method: editMode ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) { 
                closeModal(); 
                cargarReportes(); 
            }
        } catch (error) { alert("Error al guardar"); }
    };

    async function editar(id) {
        try {
            const res = await fetch(`/api/reporte/${id}`);
            const r = await res.json();
            
            document.getElementById('nombre_apellido').value = r.nombre_apellido;
            document.getElementById('cedula').value = r.cedula;
            document.getElementById('contratante').value = r.contratante;
            document.getElementById('num_control').value = r.num_control;
            document.getElementById('numero_poliza').value = r.numero_poliza;
            document.getElementById('proveedor').value = r.proveedor;
            document.getElementById('estado_paciente').value = r.estado;
            document.getElementById('patologia').value = r.patologia;
            document.getElementById('monto_dolar').value = r.monto_dolar;
            document.getElementById('monto_bs').value = r.monto_bs;
            document.getElementById('observaciones').value = r.observaciones;
            document.getElementById('tratamiento').value = r.tratamiento;
            
            editMode = true; 
            editId = id;
            document.getElementById('formTitle').innerText = "Editando Registro Nro" + id;
            document.getElementById('btnSubmit').innerHTML = '<i class="fas fa-save"></i> Actualizar Reporte';
            
            openModal();
        } catch (e) { alert("Error al cargar datos"); }
    }

    function resetForm() {
        document.getElementById('reportForm').reset();
        editMode = false;
        editId = null;
        document.getElementById('formTitle').innerText = "Nueva Operación";
        document.getElementById('btnSubmit').innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Registrar Reporte';
    }

    function filtrarTabla() {
        const input = document.getElementById('inputBusqueda').value.toLowerCase();
        const filas = document.querySelectorAll('.report-row');
        filas.forEach(f => {
            f.style.display = f.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }

    function descargarExcelPorFecha() {
        const fecha = document.getElementById('fechaExcel').value;
        if (!fecha) return alert("Selecciona una fecha");
        window.location.href = `/api/descargar_reportes?fecha=${fecha}`;
    }
</script>
</body>
</html>

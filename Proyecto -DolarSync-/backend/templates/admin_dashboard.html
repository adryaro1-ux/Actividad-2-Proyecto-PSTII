<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DolarSync - Gestión de Usuarios</title>
    <link rel="icon" href="/logo" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0070d1;
            --primary-dark: #0f172a;
            --success: #10b981;
            --danger: #ef4444;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.95);
        }

        /* --- PRELOADER --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .loader-hidden { opacity: 0; visibility: hidden; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(0, 112, 209, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #e0f2fe, #f8fafc);
            margin: 0; 
            padding-top: 110px;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        .navbar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            height: 80px;
            padding: 0 5%;
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .btn-back {
            background: #f1f5f9;
            color: var(--text-muted);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { background: #e2e8f0; color: var(--primary-dark); transform: translateX(-3px); }

        /* --- CONTENEDOR --- */
        .container { 
            width: 90%;
            max-width: 1100px; 
            margin: auto; 
            animation: fadeIn 0.6s ease-out; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .header-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-bottom: 40px; 
        }
        .header-flex h2 { font-weight: 800; color: var(--primary-dark); margin: 0; font-size: 2rem; letter-spacing: -1px; }

        /* --- TABLA --- */
        .table-card { 
            background: var(--white); 
            border-radius: 30px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.03); 
            border: 1px solid rgba(226, 232, 240, 0.8); 
        }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #f8fafc; 
            padding: 20px; 
            text-align: left; 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            border-bottom: 1px solid #f1f5f9; 
        }
        td { padding: 18px 20px; border-bottom: 1px solid #f8fafc; font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }

        /* --- BOTONES --- */
        .btn-add { 
            background: var(--primary-dark); 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 700; 
            font-family: inherit; 
            transition: 0.3s; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2); }

        .action-btn { 
            width: 38px; height: 38px; 
            border-radius: 12px; border: none; 
            cursor: pointer; transition: 0.2s; 
            display: inline-flex; align-items: center; justify-content: center; 
        }
        .btn-edit { background: #eff6ff; color: var(--primary); margin-right: 8px; }
        .btn-edit:hover { background: var(--primary); color: white; }
        .btn-delete { background: #fff1f2; color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* --- ELEMENTOS DE FILA --- */
        .user-avatar {
            width: 40px; height: 40px; border-radius: 12px; 
            background: linear-gradient(135deg, var(--primary), #06b6d4); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: white; font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0, 112, 209, 0.2);
        }

        .status-pill { 
            font-size: 0.65rem; padding: 5px 12px; 
            border-radius: 8px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 0.5px; 
        }
        .active { background: #dcfce7; color: #15803d; }
        .inactive { background: #f1f5f9; color: #64748b; }

        /* --- MODAL --- */
        .modal { 
            display: none; position: fixed; z-index: 2000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); 
        }
        .modal-content { 
            background: var(--white); 
            margin: 6vh auto; 
            padding: 40px; 
            border-radius: 32px; 
            width: 90%; max-width: 420px; 
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.25); 
            animation: modalSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalSlide { from { opacity: 0; transform: scale(0.95) translateY(-20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; margin-bottom: 10px; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .form-group input, .form-group select { 
            width: 100%; padding: 14px 18px; 
            border: 1.5px solid #e2e8f0; border-radius: 14px; 
            box-sizing: border-box; font-size: 1rem; font-family: inherit; 
            transition: 0.3s; background: #f8fafc; color: var(--primary-dark);
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(0,112,209,0.06); }
        
        .pass-wrapper { position: relative; }
        .toggle-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; }

        .help-text { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; display: block; font-weight: 500; }

        @media (max-width: 768px) {
            .header-flex { flex-direction: column; align-items: flex-start; gap: 20px; }
            .btn-add { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper"><div class="spinner"></div></div>

    <nav class="navbar">
        <div style="font-size: 1.1rem; font-weight: 800; color: var(--primary-dark); display: flex; align-items: center; gap: 12px;">
            <div style="background: var(--primary); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-shield-halved" style="color: white; font-size: 1rem;"></i>
            </div>
            <span style="letter-spacing: -0.5px;">ADMINISTRACIÓN DE ACCESOS</span>
        </div>
        <a href="{{ url_for('index') }}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Panel Principal
        </a>
    </nav>

    <div class="container">
        <div class="header-flex">
            <div>
                <h2>Usuarios del Sistema</h2>
                <p style="color: var(--text-muted); margin: 6px 0 0; font-weight: 500; font-size: 1rem;">Control de privilegios Seguros Horizontes</p>
            </div>
            <button class="btn-add" onclick="abrirModalCrear()">
                <i class="fas fa-user-plus"></i> Nuevo Usuario
            </button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Identidad</th>
                        <th>Nivel de Acceso</th>
                        <th>Estado</th>
                        <th style="text-align: right; padding-right: 30px;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h3 id="modalTitle" style="margin: 0; font-weight: 800; font-size: 1.6rem; color: var(--primary-dark); letter-spacing: -1px;">Usuario</h3>
                <i class="fas fa-user-gear" style="color: #e2e8f0; font-size: 2rem;"></i>
            </div>

            <form id="userForm" autocomplete="off">
                <input type="hidden" id="userId">
                
                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="username" required placeholder="ej: mrodriguez">
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="pass-wrapper">
                        <input type="password" id="password" autocomplete="new-password" placeholder="••••••••">
                        <button type="button" class="toggle-btn" onclick="toggleVisibility('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span id="passHelp" class="help-text">
                        <i class="fas fa-circle-info"></i> Opcional: Solo si desea cambiarla.
                    </span>
                </div>

                <div class="form-group">
                    <label>Rol de Sistema</label>
                    <select id="rol">
                        <option value="Operador">Operador</option>
                        <option value="Coordinador">Coordinador</option>
                        <option value="Gerente">Gerente</option>
                        <option value="Administrador">Administrador</option>
                    </select>
                </div>

                <div class="form-group" style="background: #f8fafc; padding: 18px; border-radius: 16px; border: 1.5px solid #e2e8f0; margin-top: 10px;">
                    <label style="display: flex; align-items: center; gap: 14px; cursor: pointer; text-transform: none; color: var(--primary-dark); margin-bottom: 0;">
                        <input type="checkbox" id="activo" checked style="width: 20px; height: 20px; margin: 0; accent-color: var(--primary);"> 
                        <span style="font-weight: 700; font-size: 0.95rem;">Cuenta Habilitada</span>
                    </label>
                </div>

                <div style="display: flex; gap: 12px; margin-top: 35px;">
                    <button type="submit" class="btn-add" style="flex: 1.5; justify-content: center;">Confirmar</button>
                    <button type="button" class="btn-back" style="flex: 1; justify-content: center;" onclick="cerrarModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.addEventListener("load", () => {
            const loader = document.getElementById("loader-wrapper");
            setTimeout(() => loader.classList.add("loader-hidden"), 300);
        });

        function toggleVisibility(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            const isPass = input.type === "password";
            input.type = isPass ? "text" : "password";
            icon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
        }

        async function cargarUsuarios() {
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                const tbody = document.getElementById('user-table-body');
                
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:50px; color:var(--text-muted);">No hay usuarios registrados.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(u => `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <div class="user-avatar">${u.username.charAt(0).toUpperCase()}</div>
                                <div style="font-weight: 700; color: var(--primary-dark); font-size: 1rem;">${u.username}</div>
                            </div>
                        </td>
                        <td><span style="color: var(--text-main); font-weight: 600;">${u.rol}</span></td>
                        <td>
                            <span class="status-pill ${u.activo ? 'active' : 'inactive'}">
                                ${u.activo ? 'Activo' : 'Suspendido'}
                            </span>
                        </td>
                        <td style="text-align: right; padding-right: 20px;">
                            <button class="action-btn btn-edit" onclick="abrirModalEditar(${u.id})" title="Editar"><i class="fas fa-user-pen"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { console.error("Error:", e); }
        }

        function abrirModalCrear() {
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = "";
            document.getElementById('modalTitle').innerText = "Nuevo Acceso";
            document.getElementById('password').required = true;
            document.getElementById('passHelp').style.display = 'none';
            document.getElementById('userModal').style.display = 'block';
        }

        async function abrirModalEditar(id) {
            const res = await fetch(`/api/users/${id}`);
            const u = await res.json();
            document.getElementById('userId').value = u.id;
            document.getElementById('username').value = u.username;
            document.getElementById('rol').value = u.rol;
            document.getElementById('activo').checked = u.activo;
            document.getElementById('password').value = ""; 
            document.getElementById('password').required = false;
            document.getElementById('passHelp').style.display = 'block';
            document.getElementById('modalTitle').innerText = "Editar Cuenta";
            document.getElementById('userModal').style.display = 'block';
        }

        function cerrarModal() { document.getElementById('userModal').style.display = 'none'; }

        document.getElementById('userForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const password = document.getElementById('password').value.trim();
            const payload = {
                username: document.getElementById('username').value,
                rol: document.getElementById('rol').value,
                activo: document.getElementById('activo').checked
            };
            if (password !== "") payload.password = password;

            const res = await fetch(id ? `/api/users/${id}` : '/api/users', {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (res.ok) { cerrarModal(); cargarUsuarios(); }
        };

        async function eliminarUsuario(id) {
            if (confirm('¿Desea revocar permanentemente este acceso?')) {
                await fetch(`/api/users/${id}`, { method: 'DELETE' });
                cargarUsuarios();
            }
        }

        window.onload = cargarUsuarios;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DolarSync - Seguros Horizontes (AMP)</title>
    <link rel="icon" href="/logo" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0070d1;
            --medical-cyan: #06b6d4;
            --dark-blue: #0f172a;
            --bg-gradient: radial-gradient(circle at top right, #e0f2fe, #f8fafc);
            --white: #ffffff;
            --error: #f43f5e;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        /* --- PRELOADER SYSTEM --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .loader-content { text-align: center; }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(0, 112, 209, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loader-text {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--dark-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulseText 1.5s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulseText { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .loader-hidden { opacity: 0; visibility: hidden; }

        /* --- LOGIN STYLES --- */
        body {
            background: var(--bg-gradient);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark-blue);
            overflow: hidden;
        }

        .bg-decor {
            position: absolute;
            width: 100%; height: 100%;
            overflow: hidden; z-index: -1;
        }

        .bg-circle {
            position: absolute; border-radius: 50%;
            background: var(--primary);
            filter: blur(80px); opacity: 0.12;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 48px 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-login { text-align: center; margin-bottom: 35px; }

        .health-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #e0f2fe; color: var(--primary);
            padding: 6px 14px; border-radius: 100px;
            font-size: 0.7rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 15px; border: 1px solid #bae6fd;
        }

        .logo-wrapper {
            width: 70px; height: 70px;
            background: var(--white); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0, 112, 209, 0.1);
            border: 1px solid #f1f5f9;
        }

        .logo-img {
            width: 48px; height: 48px;
            background-image: url('/logo');
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        h1 { font-size: 1.8rem; font-weight: 800; color: var(--dark-blue); margin: 0; letter-spacing: -1px; }
        .subtitle { color: #64748b; font-size: 0.95rem; margin-top: 8px; font-weight: 500; }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.main-icon { position: absolute; left: 18px; color: #94a3b8; transition: 0.3s; font-size: 1.1rem; }

        input {
            width: 100%; padding: 15px 15px 15px 50px;
            border: 1.5px solid #e2e8f0; border-radius: 16px;
            font-size: 1rem; transition: all 0.3s ease;
            font-family: inherit; background: #ffffff; color: var(--dark-blue);
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 112, 209, 0.08); }
        input:focus + i.main-icon { color: var(--primary); }

        .toggle-password {
            position: absolute; right: 12px;
            background: #f1f5f9; border: none; color: #64748b;
            width: 34px; height: 34px; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }

        button[type="submit"] {
            width: 100%; background: var(--dark-blue); color: white;
            border: none; padding: 18px; border-radius: 16px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; margin-top: 10px;
            display: flex; justify-content: center; align-items: center; gap: 12px;
        }

        button[type="submit"]:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0, 112, 209, 0.25); }

        .error-box {
            background: #fff1f2; color: var(--error);
            padding: 14px; border-radius: 14px; font-size: 0.85rem;
            margin-top: 25px; border: 1px solid #ffe4e6;
            display: flex; align-items: center; gap: 10px; font-weight: 600;
        }

        .footer-text { text-align: center; margin-top: 35px; font-size: 0.75rem; color: #94a3b8; font-weight: 600; }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-content">
            <div class="spinner"></div>
            <div class="loader-text">DolarSync</div>
        </div>
    </div>

    <div class="bg-decor">
        <div class="bg-circle" style="width: 400px; height: 400px; top: -100px; right: -100px;"></div>
        <div class="bg-circle" style="width: 300px; height: 300px; bottom: -50px; left: -50px; background: var(--medical-cyan);"></div>
    </div>

    <div class="login-card">
        <div class="header-login">
            <div class="health-badge">
                <i class="fas fa-hand-holding-medical"></i> Seguros Horizonte - AMP
            </div>
            <div class="logo-wrapper">
                <div class="logo-img"></div>
            </div>
            <h1>DolarSync</h1>
            <p class="subtitle">Gestión Financiera Institucional</p>
        </div>

        <form method="post" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Usuario Institucional</label>
                <div class="input-wrapper">
                    <i class="fas fa-user main-icon"></i>
                    <input type="text" id="username" name="username" placeholder="Ingrese Usuario" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña de Acceso</label>
                <div class="input-wrapper">
                    <i class="fas fa-shield-halved main-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Ingrese Contraseña" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i id="eye-icon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit">
                <span>Ingresar al Sistema</span>
                <i class="fas fa-arrow-right"></i>
            </button>

            {% if error %}
            <div class="error-box">
                <i class="fas fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}
        </form>

        <div class="footer-text">
            Copyright Seguros Horizonte S.A. &copy; 2026
        </div>
    </div>

    <script>
        // Manejo del Preloader
        window.addEventListener("load", function() {
            const loader = document.getElementById("loader-wrapper");
            setTimeout(() => {
                loader.classList.add("loader-hidden");
            }, 400); // Pequeño delay para suavidad visual
        });

        // Toggle Password
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
